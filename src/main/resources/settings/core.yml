# Terra core settings.
# Climate, stability, territories, merchant shops, quests, jobs, chat, and messages
# have their own files under src/main/resources.

# ---------------------------------------------------------------------------
# Gameplay
# ---------------------------------------------------------------------------

block-delay:
  enabled: false
  seconds: 30

rewards:
  break:
    enabled: true
    money-enabled: true

economy:
  enabled: true
  reward-scale: 0.20
  price-scale: 0.20

hunger:
  speed-multiplier: 1.0
  climate:
    comfort-min-c: 12.0
    comfort-max-c: 24.0
    mild-step-c: 8.0
    extreme-step-c: 18.0
    mild-bonus: 0.18
    extreme-bonus: 0.42
    max-multiplier: 1.85

profession-procs:
  farmer:
    instant-grow:
      base-chance: 0.02
      per-level: 0.006
      max-chance: 0.25
  lumberjack:
    instant-grow:
      base-chance: 0.02
      per-level: 0.005
      max-chance: 0.20

country-home:
  cooldown-seconds: 3600

items:
  ender-pearls-enabled: true
  shulker-boxes-enabled: true
  # Per-material functional overrides written by /terra items <material> ...
  # Example:
  # materials:
  #   CRAFTING_TABLE: false
  materials: {}

# ---------------------------------------------------------------------------
# World Systems
# ---------------------------------------------------------------------------

hostile-mobs:
  spawning-enabled: true

phantoms:
  enabled: false

wilderness-regeneration:
  enabled: true
  seconds: 600
  build-decay-seconds: 300

ore-vision:
  horizontal-radius: 20
  vertical-radius: 12

traders:
  enabled: true
  spawn-minutes-min: 180
  spawn-minutes-max: 360
  active-minutes: 90
  delivery-cooldown-minutes: 30
  accepted-quest-minutes: 1440

npc-head-tracking:
  enabled: true
  range-blocks: 5.0
  interval-ticks: 4

realtime-clock:
  enabled: false
  timezone: "Europe/Amsterdam"
  update-interval-ticks: 2400
  freeze-daylight-cycle: true
  # Leave empty to target every loaded world.
  worlds: []

# ---------------------------------------------------------------------------
# HUD And Resource Pack
# ---------------------------------------------------------------------------

resource-pack:
  enabled: false
  # Direct HTTPS URL to a zip. GitHub raw URLs work for small packs.
  url: ""
  # Leave empty unless you calculate a SHA-1 hash for the zip.
  sha1: ""
  delay-ticks: 40

itemsadder-top-status:
  enabled: true
  require-itemsadder: true
  update-ticks: 20

  tokens:
    panel: ":top_status_panel:"
    content-offset: ":offset_-248:"
    location-panel: ":top_status_location_panel:"
    job-panel: ":top_status_job_panel:"
    money-panel: ":top_status_money_panel:"
    location-offset: ":offset_-112:"
    job-offset: ":offset_-118:"
    money-offset: ":offset_-78:"

  layout:
    panel-width-pixels: 64
    location-panel-width-pixels: 96
    job-panel-width-pixels: 96
    money-panel-width-pixels: 96
    panel-gap-pixels: 8
    location-job-gap-pixels: 8
    job-money-gap-pixels: 18
    job-text-inset-pixels: 6

  # Leave this as "auto" so Terra centers each text segment inside equal-width panels.
  format: "auto"
  wilderness-label: "Wilderness"
  no-job-label: "No Job"
  max-location-chars: 7
  max-job-chars: 6

itemsadder-vital-bars:
  enabled: true
  require-itemsadder: true
  update-ticks: 10

  huds:
    health-id: "terrahud:terra_health_bar"
    hunger-id: "terrahud:terra_hunger_bar"

  display:
    # STATUS HUDs use 10 icons with half-step float values.
    health-max: 10
    hunger-max: 10
    # 10 status icons at scale_ratio 9 are about 90 HUD pixels wide.
    bar-width-pixels: 96
    bar-gap-pixels: 12
    # Optional exact overrides:
    # health-x-position-pixels: -54
    # hunger-x-position-pixels: 54

  # ItemsAdder HUDs and Bukkit actionbars share the same client display channel.
  suppress-cooldown-actionbar: true

# ---------------------------------------------------------------------------
# Sounds And Messaging
# ---------------------------------------------------------------------------

join-leave-messages:
  enabled: true

player-presence-sounds:
  enabled: true
  join-sound: "BLOCK_AMETHYST_BLOCK_CHIME"
  leave-sound: "BLOCK_AMETHYST_CLUSTER_BREAK"
  sound-volume: 0.6
  sound-pitch: 1.2

country-sounds:
  enabled: true
  invite-sent-sound: "BLOCK_NOTE_BLOCK_PLING"
  invite-received-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  transfer-request-sound: "BLOCK_AMETHYST_BLOCK_RESONATE"
  transfer-accepted-sound: "UI_TOAST_CHALLENGE_COMPLETE"
  sound-volume: 0.8
  sound-pitch: 1.0

chat-sounds:
  enabled: true
  message-sound: "BLOCK_NOTE_BLOCK_HAT"
  sound-volume: 0.25
  sound-pitch: 1.6

terra-tips:
  enabled: true
  interval-minutes: 8

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------

lag-reduction:
  ground-item-clear:
    enabled: true
    interval-minutes: 5
    warning-seconds: [60, 30, 10]
  mob-stacking:
    enabled: true
    radius-blocks: 8.0
    max-stack-size: 50
    name-format: "&e%type% &7x&f%amount%"
  item-merge:
    enabled: true
    radius-blocks: 2.5
