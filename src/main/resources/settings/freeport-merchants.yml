# Fixed starter merchants for Freeport.
#
# These merchants act like a shared island exchange:
# players sell practical early goods into Freeport stock, and other players can
# buy from that same stock at a higher price.
#
# Important rule:
# - sell-price is per item
# - buy-price is the total cost for the full bundle
# - buy-price should stay above the full bundle resale value
# - initial-stock is the starting shared supply
# - max-stock is the cap for how much the island will hold for that good

