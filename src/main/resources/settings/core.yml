# Terra core settings.
# Climate, stability, territories, merchant shops, quests, jobs, chat, and messages
# have their own files under src/main/resources.
#
# Recommended launch presets:
#
# Small server example:
#   economy.reward-scale: 0.22
#   economy.price-scale: 0.20
#   hunger.speed-multiplier: 0.95
#   wilderness-regeneration.seconds: 900
#   wilderness-regeneration.build-decay-seconds: 600
#
# Medium server example:
#   economy.reward-scale: 0.20
#   economy.price-scale: 0.20
#   hunger.speed-multiplier: 1.0
#   wilderness-regeneration.seconds: 600
#   wilderness-regeneration.build-decay-seconds: 300
#
# The live defaults below are meant to feel production-ready, not like a local
# test world.

# ---------------------------------------------------------------------------
# Gameplay
# ---------------------------------------------------------------------------

block-delay:
  enabled: false
  # 30 seconds is a strong anti-spam value if you enable the system.
  seconds: 30

rewards:
  break:
    enabled: true
    money-enabled: true

economy:
  enabled: true
  # Global money earned from Terra-controlled activity.
  # Increase slowly. Even a small bump here changes guild progression speed.
  reward-scale: 0.20
  # Global sell/buy pricing multiplier used by Terra economy surfaces.
  price-scale: 0.20

hunger:
  # Higher values make climate and travel pressure show up faster.
  speed-multiplier: 1.0
  climate:
    comfort-min-c: 12.0
    comfort-max-c: 24.0
    mild-step-c: 8.0
    extreme-step-c: 18.0
    mild-bonus: 0.18
    extreme-bonus: 0.42
    max-multiplier: 1.85

profession-procs:
  farmer:
    instant-grow:
      base-chance: 0.02
      per-level: 0.006
      max-chance: 0.25
  lumberjack:
    instant-grow:
      base-chance: 0.02
      per-level: 0.005
      max-chance: 0.20

country-home:
  # One hour is a good default for live survival. Shorter values reduce travel friction a lot.
  cooldown-seconds: 3600

items:
  ender-pearls-enabled: true
  shulker-boxes-enabled: true
  # Per-material functional overrides written by /terra items <material> ...
  # Example:
  # materials:
  #   CRAFTING_TABLE: false
  materials: {}

# ---------------------------------------------------------------------------
# World Systems
# ---------------------------------------------------------------------------

hostile-mobs:
  spawning-enabled: true

phantoms:
  # Off by default because they add pressure without teaching Terra's main loops.
  enabled: false

bats:
  enabled: true

wilderness-regeneration:
  enabled: true
  # How long player edits in unmanaged wilderness are left alone before regen/cleanup.
  seconds: 600
  # Faster decay keeps temporary spam builds under control, but can frustrate frontier building.
  build-decay-seconds: 300

ore-vision:
  horizontal-radius: 20
  vertical-radius: 12

traders:
  enabled: true
  # These windows should feel like events, not permanent background vending.
  spawn-minutes-min: 180
  spawn-minutes-max: 360
  active-minutes: 90
  delivery-cooldown-minutes: 30
  accepted-quest-minutes: 1440

npc-head-tracking:
  enabled: true
  range-blocks: 5.0
  interval-ticks: 4

realtime-clock:
  enabled: false
  timezone: "Europe/Amsterdam"
  update-interval-ticks: 2400
  freeze-daylight-cycle: true
  # Leave empty to target every loaded world.
  worlds: []

# ---------------------------------------------------------------------------
# HUD
# ---------------------------------------------------------------------------

# Resource pack delivery is handled through ItemsAdder for this project.
# Copy the content pack into plugins/ItemsAdder/contents/terra_quest_hud
# and run /iazip instead of configuring a standalone Terra resource-pack URL.

server-list-motd:
  enabled: true
  change-interval: 25
  # Supports & color codes, &#RRGGBB hex colors, and placeholders:
  # %online%, %max_players%, %date%, %server_time%
  frames:
    - lines:
        - "&aTerra Nations &8| &7%online%&8/&7%max_players%"
        - "&7Countries &8| &7Jobs &8| &7Survival"
    - lines:
        - "&aTerra Nations &8| &f%server_time%"
        - "&aBuild your country. Grow your land."
    - lines:
        - "&2Terra Nations &8| &7%date%"
        - "&7Guild-first survival with real progression."

health-hotbar:
  enabled: true
  include-armor: true
  format: "&cHP &f%current%&7/&f%max%"

itemsadder-top-status:
  enabled: true
  require-itemsadder: true
  update-ticks: 20

  tokens:
    panel: ":top_status_panel:"
    content-offset: ":offset_-248:"
    location-panel: ":top_status_location_panel:"
    location-offset: ":offset_-112:"

  layout:
    panel-width-pixels: 64
    location-panel-width-pixels: 96
    panel-gap-pixels: 8

  # Leave this as "auto" so Terra centers the location text inside the panel.
  format: "auto"
  wilderness-label: "Wilderness"
  # Very long names look poor in a narrow top-status panel.
  max-location-chars: 7

# ---------------------------------------------------------------------------
# Sounds And Messaging
# ---------------------------------------------------------------------------

join-leave-messages:
  enabled: true

player-presence-sounds:
  enabled: true
  join-sound: "BLOCK_AMETHYST_BLOCK_CHIME"
  leave-sound: "BLOCK_AMETHYST_CLUSTER_BREAK"
  sound-volume: 0.6
  sound-pitch: 1.2

country-sounds:
  enabled: true
  invite-sent-sound: "BLOCK_NOTE_BLOCK_PLING"
  invite-received-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  transfer-request-sound: "BLOCK_AMETHYST_BLOCK_RESONATE"
  transfer-accepted-sound: "UI_TOAST_CHALLENGE_COMPLETE"
  sound-volume: 0.8
  sound-pitch: 1.0

chat-sounds:
  enabled: true
  message-sound: "BLOCK_NOTE_BLOCK_HAT"
  sound-volume: 0.25
  sound-pitch: 1.6

terra-tips:
  enabled: true
  # Raise this if players feel chat is too busy.
  interval-minutes: 8

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------

lag-reduction:
  ground-item-clear:
    enabled: true
    # Five minutes keeps clutter under control without deleting drops too aggressively.
    interval-minutes: 5
    warning-seconds: [60, 30, 10]
  mob-stacking:
    enabled: true
    radius-blocks: 8.0
    max-stack-size: 50
    name-format: "&e%type% &7x&f%amount%"
  item-merge:
    enabled: true
    # Larger radii save more entities but can feel less natural around farms.
    radius-blocks: 2.5
