# Terra core settings.
# Climate, stability, territories, merchant shops, quests, jobs, chat, and messages
# have their own files under src/main/resources.

# ---------------------------------------------------------------------------
# Gameplay
# ---------------------------------------------------------------------------

block-delay:
  enabled: false
  seconds: 30

rewards:
  break:
    enabled: true
    money-enabled: true

economy:
  enabled: true
  reward-scale: 0.20
  price-scale: 0.20

hunger:
  speed-multiplier: 1.0
  climate:
    comfort-min-c: 12.0
    comfort-max-c: 24.0
    mild-step-c: 8.0
    extreme-step-c: 18.0
    mild-bonus: 0.18
    extreme-bonus: 0.42
    max-multiplier: 1.85

profession-procs:
  farmer:
    instant-grow:
      base-chance: 0.02
      per-level: 0.006
      max-chance: 0.25
  lumberjack:
    instant-grow:
      base-chance: 0.02
      per-level: 0.005
      max-chance: 0.20

country-home:
  cooldown-seconds: 3600

onboarding:
  enabled: true
  required-trials: 3
  required-playtime-minutes: 20
  starter-hub:
    enabled: true
    country-key: ""
    use-global-spawn: true
    world: ""
    x: 0.0
    y: 64.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0
  trial-thresholds:
    miner: 8
    lumberjack: 6
    farmer: 6
    builder: 12
    blacksmith: 3
    trader: 3
  npc-focus:
    enabled: true
    line-millis: 2400
    chat-clear-lines: 80
  npc-dialogue:
    default:
      - "&7Take a second to look around and read what the world is asking of you."
      - "&7Your guide will keep updating as you learn new systems."
    trader_npc:
      - "&fRoutes connect countries together through supply, demand, and timing."
      - "&fEven if you do not lock Trader first, learn where money and goods move."
    merchant_npc:
      - "&fMerchants are a simple market loop: buy what you need, sell what you have."
      - "&fUse them to understand value before you choose your first profession."
    embassy_guide:
      - "&fCountries are the long-term social loop."
      - "&fThe starter island is where you meet them before committing to your path."

items:
  ender-pearls-enabled: true
  shulker-boxes-enabled: true
  # Per-material functional overrides written by /terra items <material> ...
  # Example:
  # materials:
  #   CRAFTING_TABLE: false
  materials: {}

# ---------------------------------------------------------------------------
# World Systems
# ---------------------------------------------------------------------------

hostile-mobs:
  spawning-enabled: true

phantoms:
  enabled: false

wilderness-regeneration:
  enabled: true
  seconds: 600
  build-decay-seconds: 300

ore-vision:
  horizontal-radius: 20
  vertical-radius: 12

traders:
  enabled: true
  spawn-minutes-min: 180
  spawn-minutes-max: 360
  active-minutes: 90
  delivery-cooldown-minutes: 30
  accepted-quest-minutes: 1440

npc-head-tracking:
  enabled: true
  range-blocks: 5.0
  interval-ticks: 4

realtime-clock:
  enabled: false
  timezone: "Europe/Amsterdam"
  update-interval-ticks: 2400
  freeze-daylight-cycle: true
  # Leave empty to target every loaded world.
  worlds: []

# ---------------------------------------------------------------------------
# HUD
# ---------------------------------------------------------------------------

# Resource pack delivery is handled through ItemsAdder for this project.
# Copy the content pack into plugins/ItemsAdder/contents/terra_quest_hud
# and run /iazip instead of configuring a standalone Terra resource-pack URL.

server-list-motd:
  enabled: true
  change-interval: 25
  # Supports & color codes, &#RRGGBB hex colors, and placeholders:
  # %online%, %max_players%, %date%, %server_time%
  frames:
    - lines:
        - "&#E9FFE2&lᴛᴇʀʀᴀɴᴀᴛɪᴏɴѕ &8| &7%online%&8/&7%max_players%"
        - "&7Countries &8• &7Jobs &8• &7Survival"
    - lines:
        - "&#BEE3AA&lᴛᴇʀʀᴀɴᴀᴛɪᴏɴѕ &8| &f%server_time%"
        - "&aBuild your country. Grow your land."
    - lines:
        - "&#7DB955&lᴛᴇʀʀᴀɴᴀᴛɪᴏɴѕ &8| &7%date%"
        - "&2Play &8• &fplay.terranations.net"

health-hotbar:
  enabled: true
  include-armor: true
  format: "&c❤ &f%current%&7/&f%max%"

itemsadder-top-status:
  enabled: true
  require-itemsadder: true
  update-ticks: 20

  tokens:
    panel: ":top_status_panel:"
    content-offset: ":offset_-248:"
    location-panel: ":top_status_location_panel:"
    location-offset: ":offset_-112:"

  layout:
    panel-width-pixels: 64
    location-panel-width-pixels: 96
    panel-gap-pixels: 8

  # Leave this as "auto" so Terra centers the location text inside the panel.
  format: "auto"
  wilderness-label: "Wilderness"
  max-location-chars: 7

# ---------------------------------------------------------------------------
# Sounds And Messaging
# ---------------------------------------------------------------------------

join-leave-messages:
  enabled: true

player-presence-sounds:
  enabled: true
  join-sound: "BLOCK_AMETHYST_BLOCK_CHIME"
  leave-sound: "BLOCK_AMETHYST_CLUSTER_BREAK"
  sound-volume: 0.6
  sound-pitch: 1.2

country-sounds:
  enabled: true
  invite-sent-sound: "BLOCK_NOTE_BLOCK_PLING"
  invite-received-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  transfer-request-sound: "BLOCK_AMETHYST_BLOCK_RESONATE"
  transfer-accepted-sound: "UI_TOAST_CHALLENGE_COMPLETE"
  sound-volume: 0.8
  sound-pitch: 1.0

chat-sounds:
  enabled: true
  message-sound: "BLOCK_NOTE_BLOCK_HAT"
  sound-volume: 0.25
  sound-pitch: 1.6

terra-tips:
  enabled: true
  interval-minutes: 8

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------

lag-reduction:
  ground-item-clear:
    enabled: true
    interval-minutes: 5
    warning-seconds: [60, 30, 10]
  mob-stacking:
    enabled: true
    radius-blocks: 8.0
    max-stack-size: 50
    name-format: "&e%type% &7x&f%amount%"
  item-merge:
    enabled: true
    radius-blocks: 2.5
