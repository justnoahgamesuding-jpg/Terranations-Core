# Intro/tutorial flow shown to new players.
tutorial:
  card-border: "&8&m                                                  "
  welcome-header: "&6&lTerra Guide"
  welcome-lines:
    - "&7Welcome to Terra. This server is about long-term survival, jobs, and building a society together."
    - "&7You will be forced to choose a primary job right away. That job gives you your starter tools and determines how you begin progressing."
    - "&7You level jobs by doing their real work: miners mine, farmers grow, builders place blocks, lumberjacks chop wood, and blacksmiths forge gear."
    - "&7Countries are your long-term home. Work together, build territory, and grow your first job to max level to unlock your second one."
  intro:
    prefix: "&6[TERRA] &r"
    border: "&8&m                                                  "
    title: "&6&lGuidance"
    hint: "&eRead this, then click the button below or wait 30 seconds for the next prompt."
    button: "&a&l[ Continue ]"
    button-hover: "&7Click to continue now."
    finished: "&6&l[TERRA] &fIntro finished. The jobs menu is opening now."
    prompts:
      - "&fWelcome to Terra. This is a long-term survival world built around jobs, countries, and working together as a society."
      - "&fYour first job shapes how you begin. Jobs level through real work, and once your primary job is maxed you can unlock a second one."
      - "&fBreaking and building both have cooldowns here, so do not try to spam actions. Progress comes from steady work."
      - "&fCountries cannot be created right now. To join one, ask in chat if a country is recruiting or check which countries are open in the country list."
      - "&fAfter you join a country, use Dynmap and walk there, or use &e/country home &fif needed. Be careful: it costs money and has a &e1 hour cooldown&f."
  primary-selected-header: "&6&l[TERRA] &a&lFirst Job Chosen"
  primary-selected-lines:
    - "&fUse your starter kit and begin working your job to earn job XP."
    - "&eThere is a cooldown on both breaking and building, so work steadily instead of trying to spam blocks."
  primary-selected-miner-lines:
    - "&fAs a Miner, earn XP by mining the blocks your level allows. Start with basic stone and ore routes and keep your pickaxe or shovel in hand."
    - "&eThere is a cooldown on breaking and building, so do not try to spam mine or place blocks."
  primary-selected-lumberjack-lines:
    - "&fAs a Lumberjack, earn XP by chopping the wood your level allows. Focus on tree routes and keep your axe in hand."
    - "&eThere is a cooldown on breaking and building, so do not try to spam logs or place blocks."
  primary-selected-farmer-lines:
    - "&fAs a Farmer, earn XP by farming, planting, harvesting, and using your farming tools on the crops your level allows."
    - "&eThere is a cooldown on breaking and building, so work fields steadily instead of spamming actions."
  primary-selected-builder-lines:
    - "&fAs a Builder, earn XP through building work and block placement tied to your progression. Start with simple materials and expand as you level."
    - "&eThere is a cooldown on both breaking and building, so place and shape builds with intention."
  primary-selected-blacksmith-lines:
    - "&fAs a Blacksmith, earn XP by forging items through the blacksmith systems instead of normal crafting for higher tiers."
    - "&eThere is a cooldown on breaking and building, so your main progression comes from your forge work and crafted tools."
  first-xp-header: "&6&l[TERRA] &b&lFirst Job XP Earned"
  first-xp-lines:
    - "&fYou have started progressing. Countries cannot be created right now, so your next step is joining one."
    - "&eAsk in chat if a country is recruiting, or check the country list to see which countries are open to join."
  complete-header: "&6&l[TERRA] &6&lTutorial Complete"
  complete-lines:
    - "&fNow that you joined a country, head there by using Dynmap and walking there, or use &e/country home &fif you really need the faster route."
    - "&eBe careful: /country home costs money, which you may need early on, and it has a 1 hour cooldown."
    - "&fYour long-term goal is to level your primary job, help your country grow, and max that first job to unlock your second."
  starter-hub:
    build-blocked: "&cYou cannot build in the starter hub. Only crop planting is allowed here."
# Passive server-wide tip broadcasts.
tips:
  border: "&8&m                                                  "
  title: "&6&l[TERRA] &fServer Tip"
  prefix: "&e• &f"
  footer: "&8Stay sharp. Terra rewards planning, teamwork, and steady progress."
  lines:
    - "Each country is limited to &e16 farmland plots per member&f, so growing your member count expands your farming capacity."
    - "Leveling your jobs helps more than unlocks. Parts of progression, including &edelay reduction&f, improve as you grow."
    - "Country owners can allow other countries to use their trader routes with the &e/country trade&f commands."
    - "If you need a country, ask in chat or check the country list for countries that are &eopen to join&f."
    - "Use &eDynmap&f to plan routes to countries and resources instead of wasting early money on unnecessary teleports."
