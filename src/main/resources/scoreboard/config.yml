# Terra scoreboard settings.

custom-scoreboard:
  config-version: 7
  enabled: true
  update-ticks: 20
  # Leave this on so tutorial sidebars or other plugins can own the sidebar.
  respect-other-scoreboards: true
  hide-numbers: true
  title-animation: scoreboard_logo
  title: '&2&lTerranations'
  # Vanilla scoreboards cannot draw a real pixel shadow.
  # Keep this disabled; enabling it will not duplicate lines.
  shadow:
    enabled: false
    color: '&8'
    prefix: ''
  job-name-color: '&f'
  lines:
    - '&7%date% &8| &7%server_time%'
    - '&f%player%'
    - ''
    - '&c⚐ &f%country% &7Lv.%country_level%'
    - '&a⛏ %job_color%%job% &7Lv.%job_level%'
    - '&b✦ &f%job_xp%&7/&f%job_xp_required% XP'
    - '&6⛃ &f$%money%'
    - ''
    - '&9⌚ &f%playtime%'
    - ''
    - '&7play.terranations.net'

