# Wandering merchant wave timing and trade configuration.

merchant-shop:
  enabled: true

  # If true, merchant buy rotations are generated from a random pool.
  # End-dimension items are excluded from this pool.
  random-buy-rotation-enabled: true

  # Number of random buy offers shown in each rotation window.
  random-buy-offers-per-rotation: 5

  # Delay window between merchant waves.
  spawn-minutes-min: 60
  spawn-minutes-max: 120

  # Total active time for one merchant wave.
  active-minutes: 10
  # How often buy rotations change while the wave is active.
  rotation-minutes: 2
  # Per-player cooldown between trades.
  trade-cooldown-seconds: 30

  # Search radius around the host country home/spawn.
  spawn-radius: 8

  # Goods the merchant buys from players.
