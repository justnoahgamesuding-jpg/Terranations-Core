enabled: true
display-name: "&aFarmer"
icon: GOLDEN_HOE
slot: 12
player-cap: 10

progression:
  max-level: 15
  base-xp: 85
  xp-multiplier: 1.75
  level-up-money-base: 16.0
  level-up-money-multiplier: 1.12

starter-kit:
  - material: WOODEN_HOE
    amount: 1
  - material: BREAD
    amount: 8

rewards:
  double-drop-chance: 0.10

skill-tree:
  nodes:
    fast_growth:
      name: "Fast Growth"
      branch: "Production"
      icon: BONE_MEAL
      slot: 19
      cost: 2
      secondary-allowed: true
      description:
        - "Adds extra instant-growth chance."
    double_harvest:
      name: "Double Harvest"
      branch: "Production"
      icon: WHEAT
      slot: 20
      cost: 3
      secondary-allowed: true
      requires: [ fast_growth ]
      description:
        - "Adds 10% extra harvest yield chance."
    mega_yield:
      name: "Mega Yield"
      branch: "Production"
      icon: HAY_BLOCK
      slot: 21
      cost: 4
      requires: [ double_harvest ]
      description:
        - "Adds another 10% extra harvest yield chance."
    basic_meals:
      name: "Basic Meals"
      branch: "Cooking"
      icon: BREAD
      slot: 23
      cost: 2
      secondary-allowed: true
      description:
        - "Planned meal crafting branch."
    advanced_meals:
      name: "Advanced Meals"
      branch: "Cooking"
      icon: COOKED_BEEF
      slot: 24
      cost: 3
      requires: [ basic_meals ]
      description:
        - "Planned stronger food utility."
    biome_adaptation:
      name: "Biome Adaptation"
      branch: "Survival"
      icon: LEATHER_BOOTS
      slot: 29
      cost: 3
      requires: [ basic_meals ]
      description:
        - "Planned climate resilience node."
    fishing_specialization:
      name: "Fishing Specialization"
      branch: "Fishing"
      icon: FISHING_ROD
      slot: 31
      cost: 4
      requires: [ double_harvest ]
      description:
        - "Farmer level 5 unlock fantasy branch."
  farmland-create-xp: 3
  coarse-dirt-convert-xp: 2

levels:
  1:
    unlocks:
      - Wooden Hoe
      - Till Soil
      - Plant Wheat
      - Harvest Wheat
      - Craft Bread
      - Basic field upkeep
    blocks:
      WHEAT: { enabled: true, xp: 5 }
  2:
    unlocks:
      - Stone Hoe
      - Plant and harvest Carrots
      - Plant and harvest Potatoes
      - Cook Potatoes, Chicken, Mutton, Rabbit
      - Craft Cookies and Stews
      - Build a starter crop rotation
    blocks:
      CARROTS: { enabled: true, xp: 6 }
      POTATOES: { enabled: true, xp: 6 }
  3:
    unlocks:
      - Water Buckets
      - Plant and harvest Beetroot
      - Cook Pork and Fish
      - Craft Pumpkin Pie
      - Expand irrigation for bigger farms
    blocks:
      BEETROOTS: { enabled: true, xp: 7 }
  4:
    unlocks:
      - Iron Hoe
      - Harvest Pumpkin
      - Harvest Melon
      - Cook Beef
      - Craft Cake
      - Run larger seasonal harvests
    blocks:
      PUMPKIN: { enabled: true, xp: 8 }
      MELON: { enabled: true, xp: 8 }
  5:
    unlocks:
      - Golden Hoe
      - Use Smokers
      - Plant and harvest Nether Wart
      - Craft Rabbit Stew
      - Speed up food production chains
    blocks:
      NETHER_WART: { enabled: true, xp: 10 }
  6:
    unlocks:
      - Plant and harvest Cocoa
      - Dry Kelp
      - Craft Suspicious Stew
      - Start specialty crop farming
    blocks:
      COCOA: { enabled: true, xp: 10 }
  7:
    unlocks:
      - Diamond Hoe
